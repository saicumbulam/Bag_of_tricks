#:schema https://developers.openai.com/codex/config-schema.json
# ══════════════════════════════════════════════════════════════════════════════
# ~/.codex/config.toml
# Senior Software Engineer — Full Stack Coding & Debugging Configuration
# ══════════════════════════════════════════════════════════════════════════════

# ── Core Model ────────────────────────────────────────────────────────────────
model                  = "gpt-5-codex"        # Best agentic coding model
model_reasoning_effort = "medium"             # Balance speed vs depth (override per profile)
profile                = "dev"                # Default active profile

# ── Approval & Sandbox ────────────────────────────────────────────────────────
# on-request: pauses before shell commands — safe default for interactive dev
approval_policy = "on-request"
sandbox_mode    = "workspace-write"           # Can write to workspace; network off by default

# ── Web Search ────────────────────────────────────────────────────────────────
web_search = "cached"   # "live" for latest docs/CVEs; "cached" for speed

# ── File opener — makes citations clickable ───────────────────────────────────
file_opener = "vscode"  # "cursor" | "windsurf" | "vscode-insiders" | "none"

# ── Project root detection ────────────────────────────────────────────────────
project_root_markers         = [".git", ".hg", "package.json", "pyproject.toml", "go.mod", "Cargo.toml"]
project_doc_max_bytes        = 65536          # 64 KiB — allows rich AGENTS.md files
project_doc_fallback_filenames = ["AGENTS.md", "CLAUDE.md", ".ai-instructions.md", "CONTRIBUTING.md"]

# ── History ───────────────────────────────────────────────────────────────────
[history]
max_bytes = 20971520    # 20 MB — longer history for complex debugging sessions

# ── TUI ───────────────────────────────────────────────────────────────────────
[tui]
notifications       = ["agent-turn-complete", "approval-requested"]
notification_method = "auto"
animations          = true
show_tooltips       = false                   # Disable after onboarding
alternate_screen    = "auto"
theme               = "base16-ocean-dark"     # Clean dark theme for long sessions

# Footer: model | tokens left | git branch | cwd
status_line = ["model-with-reasoning", "context-remaining", "git-branch", "current-dir"]

# ── Features ──────────────────────────────────────────────────────────────────
[features]
shell_snapshot  = true    # Speed up repeated shell commands (stable)
undo            = true    # Enable undo support (stable)
view_image      = true    # Allow image attachments (e.g. stack traces, diagrams)
multi_agent     = true    # Enable parallel agent workflows
runtime_metrics = true    # Show token metrics in turn separators

# ── Global Agent Limits ───────────────────────────────────────────────────────
[agents]
max_threads             = 6
max_depth               = 2      # Allow root → child → grandchild agents
job_max_runtime_seconds = 1800

# ── Specialized Agent Roles ───────────────────────────────────────────────────

# Debugger: deep root cause analysis
[agents.debugger]
description         = "Performs deep root-cause analysis on bugs, errors, and regressions. Reads logs, traces, and stack frames. Never edits without explicit confirmation."
config_file         = "./agents/debugger.toml"
nickname_candidates = ["Sherlock", "Trace", "Root"]

# Reviewer: code quality and security auditor
[agents.reviewer]
description         = "Audits code for correctness, security vulnerabilities, race conditions, performance issues, and test coverage gaps. Read-only."
config_file         = "./agents/reviewer.toml"
nickname_candidates = ["Argus", "Sentinel", "Vega"]

# Refactor: safe, targeted code improvements
[agents.refactor]
description         = "Applies focused refactors: improves naming, extracts functions, reduces duplication, and modernizes patterns. Runs tests after every change."
config_file         = "./agents/refactor.toml"
nickname_candidates = ["Forge", "Chisel", "Craft"]

# Tester: test writer and coverage analyst
[agents.tester]
description         = "Writes unit, integration, and edge-case tests for changed code. Uses the project's existing test framework. Never modifies source files."
config_file         = "./agents/tester.toml"
nickname_candidates = ["Spec", "Vera", "Probe"]

# Explorer: read-only codebase navigator
[agents.explorer]
description         = "Maps the codebase: finds entry points, traces call graphs, identifies dependencies, and produces structured summaries. Never edits files."
config_file         = "./agents/explorer.toml"
nickname_candidates = ["Scout", "Atlas", "Lens"]

# Perf: performance profiler and optimizer
[agents.perf]
description         = "Identifies performance bottlenecks, memory leaks, and inefficient patterns. Proposes benchmarked fixes with before/after measurements."
config_file         = "./agents/perf.toml"
nickname_candidates = ["Turbo", "Bolt", "Flux"]

# ── Profiles — switch with: codex --profile <name> ───────────────────────────

# Dev: day-to-day interactive coding
[profiles.dev]
model                  = "gpt-5-codex"
model_reasoning_effort = "medium"
approval_policy        = "on-request"
sandbox_mode           = "workspace-write"

# Debug: maximum reasoning for hard bugs
[profiles.debug]
model                  = "gpt-5-codex"
model_reasoning_effort = "high"
approval_policy        = "on-request"
sandbox_mode           = "workspace-write"

# Review: read-only, high-reasoning audit
[profiles.review]
model                  = "gpt-5-codex"
model_reasoning_effort = "high"
approval_policy        = "on-request"
sandbox_mode           = "read-only"

# Fast: quick edits, completions, lookups
[profiles.fast]
model                  = "codex-mini-latest"
model_reasoning_effort = "low"
approval_policy        = "on-request"
sandbox_mode           = "workspace-write"

# Auto: autonomous mode for trusted tasks (e.g. scripts, migrations)
[profiles.auto]
model                  = "gpt-5-codex"
model_reasoning_effort = "medium"
approval_policy        = "never"
sandbox_mode           = "workspace-write"

# CI: headless non-interactive pipeline mode
[profiles.ci]
model                  = "codex-mini-latest"
model_reasoning_effort = "low"
approval_policy        = "never"
sandbox_mode           = "workspace-write"

# ── MCP Servers ───────────────────────────────────────────────────────────────

# Context7: always-current library and framework docs
[mcp_servers.context7]
command             = "npx"
args                = ["-y", "@upstash/context7-mcp"]
startup_timeout_sec = 20
tool_timeout_sec    = 45
enabled             = true

# Playwright: browser automation for E2E debugging
[mcp_servers.playwright]
command             = "npx"
args                = ["-y", "@playwright/mcp@latest", "--browser", "chrome", "--no-sandbox"]
startup_timeout_sec = 30
tool_timeout_sec    = 120
enabled             = false    # Enable when doing E2E / UI debugging

# Bitbucket Cloud (uncomment and fill in credentials)
# [mcp_servers.bitbucket]
