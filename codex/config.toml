# env     = { GITHUB_PERSONAL_ACCESS_TOKEN = "ghp_..." }
# enabled_tools = ["list_issues", "get_pull_request", "create_pull_request", "search_code"]
# enabled = true

# ── Analytics & Feedback ──────────────────────────────────────────────────────
[analytics]
enabled = true

[feedback]
enabled = true
