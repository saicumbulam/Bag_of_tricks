# Drop these blocks into your project's pyproject.toml so Ruff + pytest
# in VS Code have a config to read. Delete any rule codes you disagree with.

[tool.ruff]
line-length = 100
target-version = "py311"           # match your interpreter
extend-exclude = [
    ".venv",
    "build",
    "dist",
    "__pycache__",
    ".mypy_cache",
    ".ruff_cache",
    ".ipynb_checkpoints",
]

[tool.ruff.lint]
# Start broad, quiet down only what bites you.
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "B",    # flake8-bugbear (likely bugs)
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade (modern syntax)
    "SIM",  # flake8-simplify
    "RUF",  # Ruff-specific rules
    "N",    # pep8-naming
    "PTH",  # flake8-use-pathlib (prefer Path over os.path)
    "TID", # tidy imports
    "PL",   # pylint subset
    "PERF", # perflint
    "ARG",  # unused function arguments
    "T20",  # flake8-print (flags stray print())
    "DTZ",  # datetimez (timezone-aware datetimes)
]
ignore = [
    "E501",  # line too long — formatter handles it
    "PLR0913", # too many arguments — often fine in real APIs
    "PLR2004", # magic value comparison — noisy in tests
]

[tool.ruff.lint.per-file-ignores]
"__init__.py"     = ["F401"]              # allow re-exports
"tests/**/*.py"   = ["ARG", "PLR2004", "T20", "S101"]  # relax for tests
"notebooks/**/*.py" = ["T20", "E402"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.ruff.lint.isort]
known-first-party = ["your_package_name"]  # <-- edit me
combine-as-imports = true
force-sort-within-sections = true

# -----------------------------------------------------------------------------
# pytest — matches the pytestArgs in VS Code settings
# -----------------------------------------------------------------------------
[tool.pytest.ini_options]
minversion = "7.0"
addopts = [
    "-ra",                 # show short summary of all non-pass results
    "--strict-markers",
    "--strict-config",
    "--tb=short",
]
testpaths = ["tests"]
python_files  = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: integration tests that hit external services",
    "unit: fast, isolated unit tests",
]
filterwarnings = [
    "error",                             # treat warnings as errors in tests
    "ignore::DeprecationWarning:pkg_.*", # allow deprecated warnings from deps
]

# Optional: coverage config if you use pytest-cov
[tool.coverage.run]
branch = true
source = ["src"]                         # <-- edit me
omit = ["*/tests/*", "*/__init__.py"]

[tool.coverage.report]
skip_empty = true
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
